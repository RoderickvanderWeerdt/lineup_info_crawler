name: CI

on:
  pull_request:

jobs:
  ruff-check:
    name: Ruff check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

  ruff-format:
    name: Ruff format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check

  ty-check:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Type check (ty)
        run: uv run ty check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Test
        # No tests exist yet (pytest-scaffolding, #27, deliberately shipped without any).
        # pytest exits 5 ("no tests collected") in that case; treat that as success but
        # still fail on any other nonzero exit code once real tests land.
        # `|| code=$?` (not a bare `code=$?` after) matters: bash runs with `-e` here,
        # so a plain failing command on its own line would abort the script immediately,
        # before this exit-code check ever ran.
        run: |
          uv run pytest || code=$?
          if [ "${code:-0}" -ne 0 ] && [ "${code:-0}" -ne 5 ]; then
            exit "${code:-0}"
          fi
