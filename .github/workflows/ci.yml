name: CI

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check

      - name: Test
        # No tests exist yet (pytest-scaffolding, #27, deliberately shipped without any).
        # pytest exits 5 ("no tests collected") in that case; treat that as success but
        # still fail on any other nonzero exit code once real tests land.
        run: |
          uv run pytest
          code=$?
          if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then
            exit "$code"
          fi
