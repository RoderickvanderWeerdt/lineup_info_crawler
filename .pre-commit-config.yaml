exclude: |
  (?x)^(
      .*cache.*/.*|       # Exclude cache directories
      .*venv.*/.*         # Exclude virtual environment directories
  )$
default_language_version:
  python: python3.13
repos:
  # ----------------------------- 🔒 Security Tools ---------------------------- #
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: "🔒 security · Detect hardcoded secrets"
  # --------------------------- 🔍 Code Quality Tools -------------------------- #
  ### Python Tools ###
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-format
        name: "🐍 python · Format with Ruff"
      - id: ruff
        name: "🐍 python · Check with Ruff"
        args: [--fix]
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        name: "🐍 python · Validate pyproject.toml"
        additional_dependencies: ["validate-pyproject-schema-store[all]"]
  ### GitHub Actions ###
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        name: "🐙 github-actions · Validate gh workflow files"
        args: ["--verbose"]
  ### Markdown ###
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: "📝 markdown · Format markdown"
        additional_dependencies:
          - mdformat-gfm # GitHub-Flavored Markdown support
          - mdformat-ruff # Python code formatting
          - mdformat-frontmatter # YAML frontmatter support
          - ruff # Required for mdformat-ruff
  # ----------------------------- ⚡️ uv Build Tools ---------------------------- #
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.30
    hooks:
      - id: uv-sync
        name: "⚡️ uv · Sync dependencies with uv"
      - id: uv-lock
        name: "⚡️ uv · Update dependency lockfile"
  # ---------------------------- 📁 Filesystem Tools --------------------------- #
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
        name: "🐍 python · files as valid python"
      - id: check-case-conflict
        name: "📁 filesystem/📝 names · Check case sensitivity"
      - id: end-of-file-fixer
        name: "📁 filesystem/📝 clean · end with whiteline"
      - id: mixed-line-ending
        name: "📁 filesystem/📝 clean · fix mixed endings"
      - id: trailing-whitespace
        name: "📁 filesystem/📝 clean · fix trailing spaces"
      - id: check-docstring-first
        name: "📁 filesystem/📝 clean · docstring location"
      - id: check-toml
        name: "📁 filesystem/📝 content · Check toml"
      - id: check-xml
        name: "📁 filesystem/📝 content · Check xml"
      - id: check-yaml
        name: "📁 filesystem/📝 content · Check yaml"
        args: ["--allow-multiple-documents"]
      - id: debug-statements
        name: "📁 filesystem/📝 content · clear debug"
      - id: check-shebang-scripts-are-executable
        name: "📁 filesystem/⚙️ exec · Verify script permissions"
      - id: check-symlinks
        name: "📁 filesystem/🔗 symlink · Check symlink validity"
      - id: destroyed-symlinks
        name: "📁 filesystem/🔗 symlink · Detect broken symlinks"
      # ------------------------------- 🌳 Git Tools ------------------------------- #
      - id: check-merge-conflict
        name: "🌳 git · Detect conflict markers"
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: [--branch, main]
      - id: check-added-large-files
        name: "🌳 git · Block large file commits"
        args: ["--maxkb=5000"]
